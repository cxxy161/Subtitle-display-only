<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>影院字幕机 v1.9</title>
    <script src="https://cdn.jsdelivr.net/gh/gzuidhof/coi-serviceworker@latest/coi-serviceworker.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #aaa; font-family: sans-serif; overflow: hidden; }
        #app { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        #error-log { 
            position: absolute; top: 0; left: 0; width: 100%; max-height: 50vh; overflow-y: auto; 
            background: rgba(30, 0, 0, 0.9); color: #ff5555; padding: 10px; box-sizing: border-box;
            font-size: 12px; z-index: 9999; display: none; word-wrap: break-word; user-select: text; -webkit-user-select: text;
            cursor: pointer;
        }

        #canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 10; transition: filter 0.3s; }
        #touch-mask { position: absolute; width: 100%; height: 100%; z-index: 20; }
        
        #controls {
            position: absolute; bottom: 0; width: 100%; background: rgba(0, 0, 0, 0.85);
            padding: 15px; box-sizing: border-box; z-index: 30;
            display: flex; flex-direction: column; gap: 12px;
            transition: transform 0.3s ease; user-select: none;
        }
        .hidden { transform: translateY(100%); }
        
        .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
        button, label.btn {
            background: #222; color: #ccc; border: 1px solid #444; padding: 8px 12px;
            border-radius: 4px; font-size: 14px; cursor: pointer; text-align: center;
        }
        button:active, label.btn:active { background: #444; }
        input[type="file"] { display: none; }
        
        .time-display { font-size: 20px; font-weight: bold; color: #fff; font-variant-numeric: tabular-nums; width: 130px;}
        .version-badge { font-size: 12px; color: #666; position: absolute; top: -15px; left: 0; }
        
        .timeline-container { display: flex; align-items: center; gap: 10px; width: 100%; position: relative; }
        #progress-bar { flex-grow: 1; height: 6px; -webkit-appearance: none; background: #444; border-radius: 3px; outline: none; }
        #progress-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; cursor: pointer; }
        
        .slider-group { display: flex; align-items: center; gap: 5px; font-size: 12px; }
        input[type=range].mini-slider { width: 80px; }
    </style>
</head>
<body>
    <div id="error-log"></div>
    <div id="app">
        <canvas id="canvas"></canvas>
        <div id="touch-mask" onclick="toggleControls()"></div>
        
        <div id="controls">
            <div class="timeline-container">
                <span class="version-badge">v1.9 跨域终极版</span>
                <div class="time-display" id="clock">00:00:00.0</div>
                <input type="range" id="progress-bar" min="0" max="100" step="0.1" value="0" oninput="seekTime(this.value)">
                <div class="time-display" id="duration" style="font-size: 14px; width: 60px; text-align: right;">00:00</div>
            </div>

            <div class="row">
                <div>
                    <button onclick="togglePlay()" id="play-btn" style="background: #3a3; color: #fff;">▶ 开始同步</button>
                    <button onclick="enterCinemaMode()">🎦 全屏横屏</button>
                </div>
                <label class="btn"><input type="file" id="ass-file" accept=".ass">📂 导入ASS</label>
            </div>
            
            <div class="row">
                <div class="slider-group">
                    <span>偏移:</span>
                    <button onclick="adjustOffset(-0.5)">-0.5s</button>
                    <button onclick="adjustOffset(-0.1)">-0.1s</button>
                    <button onclick="adjustOffset(0.1)">+0.1s</button>
                    <button onclick="adjustOffset(0.5)">+0.5s</button>
                    <span id="offset-val" style="width: 40px; text-align: right;">0.0s</span>
                </div>
            </div>

            <div class="row">
                <div class="slider-group">
                    <span>大小:</span>
                    <input type="range" class="mini-slider" id="scale" min="0.5" max="3" step="0.1" value="1" oninput="updateScale(this.value)">
                </div>
                <div class="slider-group">
                    <span>亮度:</span>
                    <input type="range" class="mini-slider" id="brightness" min="0.2" max="1" step="0.1" value="1" oninput="updateColor()">
                </div>
                <div class="slider-group">
                    <span>护眼红:</span>
                    <input type="range" class="mini-slider" id="red-tint" min="0" max="1" step="0.1" value="0" oninput="updateColor()">
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import JASSUB from 'https://cdn.jsdelivr.net/npm/jassub@1.8.6/dist/jassub.es.js';

        const errorLogBox = document.getElementById('error-log');
        
        errorLogBox.addEventListener('click', function() {
            this.style.display = 'none';
            this.innerHTML = '';
        });

        function printError(msg) {
            errorLogBox.style.display = 'block';
            if (!errorLogBox.innerHTML.includes('点击任意位置清空')) {
                errorLogBox.innerHTML = '<div style="text-align: center; color: #fff; border-bottom: 1px dashed #555; padding-bottom: 5px; margin-bottom: 5px; font-weight: bold;">[点击任意位置清空并关闭面板]</div>' + errorLogBox.innerHTML;
            }
            errorLogBox.innerHTML += `<div style="margin-bottom: 4px;">${msg}</div>`;
        }
        
        window.addEventListener('error', (e) => printError(`[系统报错] ${e.message}`));
        window.addEventListener('unhandledrejection', (e) => printError(`[异步崩溃] ${e.reason}`));
        
        const oldErr = console.error;
        const oldWarn = console.warn;
        console.error = function(...args) { printError(`[引擎报错] ${args.join(' ')}`); oldErr.apply(console, args); };
        console.warn = function(...args) { printError(`[引擎警告] ${args.join(' ')}`); oldWarn.apply(console, args); };

        let jassub = null;
        let isPlaying = false;
        let baseTime = 0; 
        let offset = 0;   
        let lastRealTime = 0; 
        let totalDuration = 0;
        let isDragging = false; 

        const canvas = document.getElementById('canvas');
        const controls = document.getElementById('controls');
        const clockDisplay = document.getElementById('clock');
        const durationDisplay = document.getElementById('duration');
        const progressBar = document.getElementById('progress-bar');
        const playBtn = document.getElementById('play-btn');

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            if (jassub) jassub.resize();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function parseAssDuration(text) {
            let max = 0;
            const regex = /Dialogue: [^,]*,(\d+):(\d{2}):(\d{2})\.(\d{2})/g;
            let match;
            while ((match = regex.exec(text)) !== null) {
                const secs = parseInt(match[1])*3600 + parseInt(match[2])*60 + parseInt(match[3]) + parseInt(match[4])/100;
                if (secs > max) max = secs;
            }
            return max > 0 ? max : 7200; 
        }

        function formatTime(secs, showMs = true) {
            const h = Math.floor(secs / 3600).toString().padStart(2, '0');
            const m = Math.floor((secs % 3600) / 60).toString().padStart(2, '0');
            const s = Math.floor(secs % 60).toString().padStart(2, '0');
            if (!showMs) return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;
            const ms = Math.floor((secs % 1) * 10).toString();
            return `${h}:${m}:${s}.${ms}`;
        }

        document.getElementById('ass-file').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const textContent = await file.text();
            
            try {
                totalDuration = parseAssDuration(textContent);
                progressBar.max = totalDuration;
                durationDisplay.innerText = formatTime(totalDuration, false);

                errorLogBox.style.display = 'block';
                if (!errorLogBox.innerHTML.includes('点击任意位置清空')) {
                    errorLogBox.innerHTML = '<div style="text-align: center; color: #fff; border-bottom: 1px dashed #555; padding-bottom: 5px; margin-bottom: 5px; font-weight: bold;">[点击任意位置清空并关闭面板]</div>';
                }
                errorLogBox.innerHTML += '<div style="color: #44ff44;">执行 Blob 注入，构建渲染管道中...</div>';

                // 核心修复：用 Blob 和 importScripts 搞个套娃，强行绕过同源策略
                const workerCode = `importScripts('https://cdn.jsdelivr.net/npm/jassub@1.8.6/dist/jassub-worker.js');`;
                const workerBlob = new Blob([workerCode], { type: 'text/javascript' });
                const localWorkerUrl = URL.createObjectURL(workerBlob);

                if (jassub) jassub.destroy();
                
                jassub = new JASSUB({
                    canvas: canvas,
                    subContent: textContent,
                    subtitleScale: document.getElementById('scale').value,
                    workerUrl: localWorkerUrl,
                    wasmUrl: 'https://cdn.jsdelivr.net/npm/jassub@1.8.6/dist/jassub-worker.wasm',
                    fallbackFont: 'sans-serif'
                });
                
                resizeCanvas();

                baseTime = 0;
                offset = 0;
                progressBar.value = 0;
                updateDisplay(0);
                
                setTimeout(() => { errorLogBox.style.display = 'none'; errorLogBox.innerHTML = ''; }, 1000);
            } catch (err) {
                printError(`[初始化失败] ${err.message}`);
            }
        });

        function updateDisplay(renderTime) {
            if (jassub) jassub.setCurrentTime(Math.max(0, renderTime));
            clockDisplay.innerText = formatTime(Math.max(0, renderTime));
            if (!isDragging) progressBar.value = Math.max(0, renderTime);
        }

        function tick() {
            if (isPlaying && !isDragging) {
                const now = performance.now();
                const delta = (now - lastRealTime) / 1000;
                baseTime += delta;
                lastRealTime = now;
                updateDisplay(baseTime + offset);
            }
            requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);

        window.togglePlay = function() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                lastRealTime = performance.now();
                playBtn.innerText = '⏸ 暂停';
                playBtn.style.background = '#aa3333';
            } else {
                playBtn.innerText = '▶ 开始同步';
                playBtn.style.background = '#3a3';
            }
        };

        progressBar.addEventListener('mousedown', () => isDragging = true);
        progressBar.addEventListener('touchstart', () => isDragging = true);
        
        window.seekTime = function(val) {
            const targetTime = parseFloat(val);
            baseTime = targetTime - offset;
            updateDisplay(targetTime);
        };

        progressBar.addEventListener('mouseup', () => { isDragging = false; lastRealTime = performance.now(); });
        progressBar.addEventListener('touchend', () => { isDragging = false; lastRealTime = performance.now(); });

        window.adjustOffset = function(val) {
            offset += val;
            document.getElementById('offset-val').innerText = offset.toFixed(1) + 's';
            updateDisplay(baseTime + offset);
        };

        window.updateScale = function(val) { if (jassub) jassub.setSubtitleScale(parseFloat(val)); };
        
        window.updateColor = function() {
            const brightness = document.getElementById('brightness').value;
            const red = document.getElementById('red-tint').value;
            canvas.style.filter = `brightness(${brightness}) sepia(${red}) hue-rotate(-50deg) saturate(${1 + red * 2})`;
        };

        window.toggleControls = function() { controls.classList.toggle('hidden'); };

        window.enterCinemaMode = async function() {
            try {
                if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
                if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape');
                if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
                controls.classList.add('hidden');
                resizeCanvas();
            } catch (err) { printError(`[环境受限] ${err.message}`); }
        };
    </script>
</body>
</html>
